name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Run `telegram-bot-mcp call sendMessage '{"chat_id":"...","text":"..."}'`
        2. See error...

  - type: textarea
    id: output
    attributes:
      label: Output / Error
      description: Paste any error messages or unexpected output
      render: shell

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - MCP (stdio)
        - CLI
        - Both
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `telegram-bot-mcp --version` or commit hash
      placeholder: v1.0.0

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
