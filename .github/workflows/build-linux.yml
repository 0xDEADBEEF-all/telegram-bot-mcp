name: Build Linux

concurrency:
  group: build-linux-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  PATH: /home/ivan/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

jobs:
  build:
    name: Build & Clippy
    runs-on: [self-hosted, Linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust version
        run: rustc --version && cargo --version

      - name: Check source cache
        id: cache
        run: |
          HASH=$(find src -type f -name "*.rs" -exec sha256sum {} \; | sort | sha256sum | cut -c1-12)
          CONFIG_HASH=$(cat Cargo.toml Cargo.lock 2>/dev/null | sha256sum | cut -c1-12)
          SOURCE_HASH=$(echo "$HASH$CONFIG_HASH" | sha256sum | cut -c1-12)

          CACHE_DIR="$HOME/.cache/telegram-bot-mcp"
          CACHED_BIN="$CACHE_DIR/telegram-bot-mcp-$SOURCE_HASH"

          echo "Source hash: $SOURCE_HASH"
          echo "hash=$SOURCE_HASH" >> $GITHUB_OUTPUT

          if [ -f "$CACHED_BIN" ]; then
            echo "Cache HIT"
            echo "hit=true" >> $GITHUB_OUTPUT
          else
            echo "Cache MISS"
            echo "hit=false" >> $GITHUB_OUTPUT
          fi

      - name: Build (release)
        if: steps.cache.outputs.hit != 'true'
        run: cargo build --release

      - name: Clippy
        if: steps.cache.outputs.hit != 'true'
        run: cargo clippy --release -- -D warnings

      - name: Save to cache
        if: steps.cache.outputs.hit != 'true'
        run: |
          CACHE_DIR="$HOME/.cache/telegram-bot-mcp"
          mkdir -p "$CACHE_DIR"
          cp target/release/telegram-bot-mcp "$CACHE_DIR/telegram-bot-mcp-${{ steps.cache.outputs.hash }}"
          ls -t "$CACHE_DIR"/telegram-bot-mcp-* | tail -n +6 | xargs -r rm -f
          echo "Saved to cache"

      - name: Verify
        run: |
          if [ "${{ steps.cache.outputs.hit }}" = "true" ]; then
            BIN="$HOME/.cache/telegram-bot-mcp/telegram-bot-mcp-${{ steps.cache.outputs.hash }}"
          else
            BIN="target/release/telegram-bot-mcp"
          fi
          SIZE=$(du -h "$BIN" | cut -f1)
          echo "Binary: $BIN ($SIZE)"
          "$BIN" list | tail -1
